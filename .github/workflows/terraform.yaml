name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix_config: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Dynamic Matrix Configuration
        id: build-matrix
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi

          echo "Evaluating changes between $BASE and $HEAD..."

          # Capture modified/added and deleted directories safely
          CHANGED_LIST=$(git diff --name-only --diff-filter=AM $BASE $HEAD | grep "\.tf$" | xargs -I{} dirname {} | sort -u | grep -v '^\.$' || true)
          DELETED_LIST=$(git diff --name-only --diff-filter=D $BASE $HEAD | grep "main\.tf$" | xargs -I{} dirname {} | sort -u | grep -v '^\.$' || true)

          # Build a clean JSON configuration array dynamically using jq
          MATRIX_JSON=$(jq -n \
            --arg changed "$CHANGED_LIST" \
            --arg deleted "$DELETED_LIST" \
            '
            [ ($changed | split("\n") | .[] | select(length > 0) | {type: "update", directory: .}),
              ($deleted | split("\n") | .[] | select(length > 0) | {type: "destroy", directory: .}) ]
            ')

          # Determine if we actually have anything to process
          COUNT=$(echo "$MATRIX_JSON" | jq 'length')
          
          if [ "$COUNT" -eq "0" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          fi

          echo "Generated Infrastructure Matrix: $MATRIX_JSON"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix_config) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Reconstruct Workspace if Deleted
        run: |
          # Robust defensive safety gate
          if [ -z "${{ matrix.directory }}" ] || [ "${{ matrix.directory }}" == "Array" ]; then
            echo "Invalid matrix element reference detected. Exiting safely."
            exit 0
          fi

          if [ "${{ matrix.type }}" == "destroy" ]; then
            echo "Infrastructure directory is flagged for removal. Building isolated environment..."
            TEMP_WS="/tmp/tf-matrix-workspace"
            rm -rf $TEMP_WS && mkdir -p $TEMP_WS
            
            git show HEAD~1:${{ matrix.directory }}/main.tf > $TEMP_WS/main.tf
            git show HEAD~1:${{ matrix.directory }}/variables.tf > $TEMP_WS/variables.tf 2>/dev/null || true
            git show HEAD~1:${{ matrix.directory }}/terraform.tfvars > $TEMP_WS/terraform.tfvars 2>/dev/null || true
            
            echo "TARGET_PATH=$TEMP_WS" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=$GITHUB_WORKSPACE/${{ matrix.directory }}" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TARGET_PATH }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          if [ "${{ matrix.type }}" == "destroy" ]; then
            terraform plan -destroy -no-color -out=tfplan 2>&1 | tee plan_output.txt
          else
            terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          fi
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '${{ matrix.directory }}';
            const type = '${{ matrix.type }}';
            const plan = fs.readFileSync(`${process.env.TARGET_PATH}/plan_output.txt`, 'utf8');
            const output = `## 🔍 Terraform Plan (${type.toUpperCase()}) — \`${dir}\`
            <details><summary>Show Plan Metrics</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix_config) }}
    environment:
      name: dev

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Reconstruct Target Workspace Context
        run: |
          if [ -z "${{ matrix.directory }}" ] || [ "${{ matrix.directory }}" == "Array" ]; then
            echo "Invalid matrix element reference detected. Exiting safely."
            exit 0
          fi

          if [ "${{ matrix.type }}" == "destroy" ]; then
            TEMP_WS="/tmp/tf-apply-destroy-workspace"
            rm -rf $TEMP_WS && mkdir -p $TEMP_WS
            git show HEAD~1:${{ matrix.directory }}/main.tf > $TEMP_WS/main.tf
            git show HEAD~1:${{ matrix.directory }}/variables.tf > $TEMP_WS/variables.tf 2>/dev/null || true
            git show HEAD~1:${{ matrix.directory }}/terraform.tfvars > $TEMP_WS/terraform.tfvars 2>/dev/null || true
            echo "TARGET_PATH=$TEMP_WS" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=$GITHUB_WORKSPACE/${{ matrix.directory }}" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TARGET_PATH }}

      - name: Execute Pipeline Event Execution
        run: |
          if [ "${{ matrix.type }}" == "destroy" ]; then
            echo "Executing complete automated destruction mapping..."
            terraform destroy -auto-approve
          else
            terraform plan -out=tfplan
            terraform apply -auto-approve tfplan
            
            echo "## ✅ Resources Created" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            terraform output >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
        working-directory: ${{ env.TARGET_PATH }}