name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_dirs: ${{ steps.changes.outputs.dirs }}
      deleted_dirs: ${{ steps.changes.outputs.deleted }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pull full history to parse diff states accurately

      - name: Detect changed and deleted Terraform directories
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi

          # 1. Capture Created or Modified files/directories
          CHANGED=$(git diff --name-only --diff-filter=AM $BASE $HEAD | grep "\.tf$" | xargs -I{} dirname {} | sort -u | jq -R -s -c 'split("\n")[:-1]')
          
          # 2. Capture Deleted files/directories explicitly
          DELETED=$(git diff --name-only --diff-filter=D $BASE $HEAD | grep "main\.tf$" | xargs -I{} dirname {} | sort -u | jq -R -s -c 'split("\n")[:-1]')
          
          # Fallbacks for safety
          if [ -z "$CHANGED" ] || [ "$CHANGED" == "[]" ]; then CHANGED="[]"; fi
          if [ -z "$DELETED" ] || [ "$DELETED" == "[]" ]; then DELETED="[]"; fi

          echo "dirs=$CHANGED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
          
          echo "Active Changed dirs: $CHANGED"
          echo "Detected Deleted dirs: $DELETED"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'pull_request' && (needs.detect-changes.outputs.changed_dirs != '[]' || needs.detect-changes.outputs.deleted_dirs != '[]')
    
    # We create a composite matrix strategy to handle both modifications and removals safely
    strategy:
      fail-fast: false
      matrix:
        include:
          # Inject updates map
          - type: update
            directory: ${{ fromJson(needs.detect-changes.outputs.changed_dirs) }}
          # Inject deletions map
          - type: destroy
            directory: ${{ fromJson(needs.detect-changes.outputs.deleted_dirs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      # CRUCIAL STEP: Reconstruct files in a temp directory if the type is "destroy"
      - name: Reconstruct Workspace if Deleted
        run: |
          if [ "${{ matrix.type }}" == "destroy" ]; then
            echo "Infrastructure directory is flagged for removal. Building isolated environment..."
            TEMP_WS="/tmp/tf-matrix-workspace"
            rm -rf $TEMP_WS && mkdir -p $TEMP_WS
            
            # Pull file snapshots from the base merge-target branch tracking
            git show HEAD~1:${{ matrix.directory }}/main.tf > $TEMP_WS/main.tf
            git show HEAD~1:${{ matrix.directory }}/variables.tf > $TEMP_WS/variables.tf 2>/dev/null || true
            git show HEAD~1:${{ matrix.directory }}/terraform.tfvars > $TEMP_WS/terraform.tfvars 2>/dev/null || true
            
            echo "TARGET_PATH=$TEMP_WS" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=$GITHUB_WORKSPACE/${{ matrix.directory }}" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TARGET_PATH }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          # If it's a deletion, plan a complete destruction run
          if [ "${{ matrix.type }}" == "destroy" ]; then
            terraform plan -destroy -no-color -out=tfplan 2>&1 | tee plan_output.txt
          else
            terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          fi
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '${{ matrix.directory }}';
            const type = '${{ matrix.type }}';
            const plan = fs.readFileSync(`${process.env.TARGET_PATH}/plan_output.txt`, 'utf8');
            const output = `## 🔍 Terraform Plan (${type.toUpperCase()}) — \`${dir}\`
            <details><summary>Show Plan Metrics</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: detect-changes
    # Triggers on standard push to main when updates OR drops are recorded
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && (needs.detect-changes.outputs.changed_dirs != '[]' || needs.detect-changes.outputs.deleted_dirs != '[]')
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: update
            directory: ${{ fromJson(needs.detect-changes.outputs.changed_dirs) }}
          - type: destroy
            directory: ${{ fromJson(needs.detect-changes.outputs.deleted_dirs) }}
    environment:
      name: dev

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      # Workspace reconstruction block for execution runtime stability
      - name: Reconstruct Target Workspace Context
        run: |
          if [ "${{ matrix.type }}" == "destroy" ]; then
            TEMP_WS="/tmp/tf-apply-destroy-workspace"
            rm -rf $TEMP_WS && mkdir -p $TEMP_WS
            git show HEAD~1:${{ matrix.directory }}/main.tf > $TEMP_WS/main.tf
            git show HEAD~1:${{ matrix.directory }}/variables.tf > $TEMP_WS/variables.tf 2>/dev/null || true
            git show HEAD~1:${{ matrix.directory }}/terraform.tfvars > $TEMP_WS/terraform.tfvars 2>/dev/null || true
            echo "TARGET_PATH=$TEMP_WS" >> $GITHUB_ENV
          else
            echo "TARGET_PATH=$GITHUB_WORKSPACE/${{ matrix.directory }}" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TARGET_PATH }}

      - name: Execute Pipeline Event Execution
        run: |
          if [ "${{ matrix.type }}" == "destroy" ]; then
            echo "Executing complete automated destruction mapping..."
            terraform destroy -auto-approve
          else
            terraform plan -out=tfplan
            terraform apply -auto-approve tfplan
            
            echo "## ✅ Resources Created" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            terraform output >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
        working-directory: ${{ env.TARGET_PATH }}

  destroy:
    name: Manual Emergency Destroy
    runs-on: ubuntu-latest
    # Corrected layout syntax to pass matrix dependency checking pipelines cleanly
    needs: detect-changes
    if: github.event.inputs.action == 'destroy'
    environment:
      name: dev-destroy
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-changes.outputs.changed_dirs) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ matrix.directory }}
        run: terraform destroy -auto-approve